<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Livro Histórico</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#012544">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Livro Histórico">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{color-scheme:dark}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,#031522 0%, #031b2f 100%);
  font-family:Arial,Helvetica,sans-serif;
  color:#fff;
  padding:20px;
}
.wrap{
  width:min(420px,100%);
  text-align:center;
}
.logo-img{
  width:120px;
  height:120px;
  object-fit:contain;
  border-radius:28px;
  margin:0 auto 18px;
  display:block;
  box-shadow:0 10px 28px rgba(0,0,0,.30);
}
.title{
  font-size:28px;
  font-weight:800;
  margin-bottom:10px;
  letter-spacing:.03em;
}
.sub{
  opacity:.9;
  line-height:1.45;
  margin-bottom:18px;
  font-size:14px;
}
button{
  width:100%;
  padding:14px 16px;
  border:none;
  border-radius:14px;
  font:inherit;
  font-weight:700;
}
#installBtn{
  background:#f0c419;
  color:#0b1220;
}
.note{
  margin-top:12px;
  font-size:12px;
  opacity:.82;
  line-height:1.45;
}
.panel{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
  border-radius:24px;
  padding:24px 20px;
  box-shadow:0 18px 40px rgba(0,0,0,.34);
}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <img class="logo-img" src="icon-512.png" alt="Logo Livro Histórico">
    <div class="title">Livro Histórico</div>
    <div class="sub" id="subText">Instale o aplicativo para usar da forma correta.</div>
    <button id="installBtn" type="button">Instalar aplicativo</button>
    <div class="note" id="noteText">Abra no Chrome e instale o app. O uso pelo navegador não é permitido.</div>
  </div>
</div>

<script>
let deferredPrompt = null;

function isIOS() {
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}
function isSafari() {
  return /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
}
function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
}

// Se já estiver instalado, entra direto no app
if (isStandalone()) {
  location.replace('app.html');
}

window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredPrompt = e;
});

window.addEventListener('appinstalled', function(){
  deferredPrompt = null;
  document.getElementById('subText').textContent = 'Aplicativo instalado com sucesso. Abra o app instalado para entrar.';
  document.getElementById('noteText').textContent = 'Depois de instalar, use o ícone do Livro Histórico na tela inicial.';
  try { document.getElementById('installBtn').style.display = 'none'; } catch(e){}
});

document.getElementById('installBtn').addEventListener('click', async function(){
  if (deferredPrompt) {
    deferredPrompt.prompt();
    try { await deferredPrompt.userChoice; } catch(e){}
    return;
  }

  if (isIOS() && isSafari()) {
    document.getElementById('subText').textContent = 'No iPhone, instale pelo menu Compartilhar do Safari e depois “Adicionar à Tela de Início”.';
    document.getElementById('noteText').textContent = 'Depois de instalar, feche o navegador e abra somente pelo ícone instalado.';
    return;
  }

  alert('Abra no Chrome e use o botão instalar. Depois, abra pelo app instalado.');
}, true);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./service-worker.js').catch(console.error);
  });
}
</script>
</body>
</html>
